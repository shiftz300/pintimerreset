name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  lint:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: '.'
          severity: warning
          ignore: action.sh,service.sh,customize.sh

  package:
    name: Package Module
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Create module zip
        run: |
          zip -r PinTimerReset.zip . \
            -x ".git/*" ".github/*" "README.md"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: PinTimerReset
          path: PinTimerReset.zip

  release:
    name: GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs: package
    steps:
      - uses: actions/checkout@v4

      - name: Create module zip
        run: |
          zip -r PinTimerReset-${{ github.ref_name }}.zip . \
            -x ".git/*" ".github/*" "README.md"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          files: PinTimerReset-${{ github.ref_name }}.zip
          generate_release_notes: true
